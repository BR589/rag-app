<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; height: 100vh; }
    .sidebar { width: 260px; background: #1e1e2e; color: white; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .sidebar h2 { font-size: 18px; color: #cdd6f4; }
    .sidebar input[type="text"] { padding: 8px; border-radius: 6px; border: none; width: 100%; background: #313244; color: white; }
    .sidebar input[type="file"] { color: #cdd6f4; font-size: 13px; }
    .upload-btn { background: #89b4fa; color: #1e1e2e; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    .upload-btn:hover { background: #74c7ec; }
    .upload-status { font-size: 13px; color: #a6e3a1; min-height: 20px; }
    .chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 12px; }
    .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 8px; }
    .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
    .user { background: #89b4fa; color: #1e1e2e; align-self: flex-end; border-bottom-right-radius: 2px; }
    .bot { background: white; color: #1e1e2e; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .input-row { display: flex; gap: 10px; }
    .input-row input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; outline: none; }
    .input-row button { background: #89b4fa; color: #1e1e2e; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .input-row button:hover { background: #74c7ec; }
    .typing { color: #888; font-style: italic; font-size: 13px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>📄 RAG Chat</h2>
  <div>
    <label style="font-size:13px;color:#cdd6f4;">Tenant ID</label>
    <input type="text" id="tenantId" value="client1" />
  </div>
  <div>
    <label style="font-size:13px;color:#cdd6f4;">Upload PDF</label><br/><br/>
    <input type="file" id="fileInput" accept=".pdf" />
  </div>
  <button class="upload-btn" onclick="uploadFile()">Upload & Train</button>
  <div class="upload-status" id="uploadStatus"></div>
</div>

<div class="chat-area">
  <div class="messages" id="messages">
    <div class="message bot">👋 Hi! Upload a PDF and ask me anything about it.</div>
  </div>
  <div class="input-row">
    <input type="text" id="questionInput" placeholder="Ask a question..." onkeydown="if(event.key==='Enter') askQuestion()" />
    <button onclick="askQuestion()">Send</button>
  </div>
</div>

<script>
  const API = window.location.origin;

  async function uploadFile() {
    const tenantId = document.getElementById("tenantId").value;
    const file = document.getElementById("fileInput").files[0];
    const status = document.getElementById("uploadStatus");

    if (!file) { status.textContent = "Please select a file."; return; }

    status.textContent = "Uploading...";
    const formData = new FormData();
    formData.append("tenant_id", tenantId);
    formData.append("file", file);

    const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
    const data = await res.json();

    if (data.status === "success") {
      status.textContent = `✅ Done! ${data.chunks_stored} chunks stored.`;
    } else {
      status.textContent = "❌ Upload failed.";
    }
  }

  async function askQuestion() {
    const tenantId = document.getElementById("tenantId").value;
    const input = document.getElementById("questionInput");
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, "user");
    input.value = "";
    addMessage("Thinking...", "bot typing-msg");

    const formData = new FormData();
    formData.append("tenant_id", tenantId);
    formData.append("question", question);

    const res = await fetch(`${API}/ask`, { method: "POST", body: formData });
    const data = await res.json();

    document.querySelector(".typing-msg")?.remove();
    addMessage(data.answer, "bot");
  }

  function addMessage(text, type) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }
</script>

</body>
</html>
